<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:1080px; height:1350px; overflow:hidden; }
  .post { position:relative; width:1080px; height:1350px; background:#0a0a0a; font-family:"Segoe UI",Arial,sans-serif; }

  .background {
    position:absolute; top:0; left:0; width:100%; height:100%;
    object-fit:cover; object-position:center;
  }

  .overlay {
    position:absolute; inset:0; z-index:1;
    background:linear-gradient(180deg,
      rgba(0,0,0,0.00) 0%,
      rgba(0,0,0,0.05) 40%,
      rgba(0,0,0,0.45) 62%,
      rgba(0,0,0,0.82) 80%,
      rgba(0,0,0,0.94) 100%
    );
  }

  .category {
    position:absolute; z-index:2; top:64px; left:64px;
    background:#B8860B; color:#fff; font-weight:800; font-size:26px;
    letter-spacing:1px; text-transform:uppercase;
    padding:10px 24px; border-radius:6px;
  }

  .logo {
    position:absolute; z-index:2; left:50%; top:990px; transform:translateX(-50%);
    width:330px; filter:drop-shadow(0 2px 8px rgba(0,0,0,0.5));
  }

  .headline {
    position:absolute; z-index:2; width:920px; left:50%; top:1080px;
    transform:translateX(-50%);
    font-size:48px; font-weight:900; line-height:1.08; letter-spacing:-1px;
    color:#FFFFFF; text-align:center;
    text-shadow:0 2px 10px rgba(0,0,0,0.6);
    text-wrap:balance;
  }

  .footer {
    position:absolute; z-index:2; bottom:36px; left:0; width:100%;
    text-align:center; color:rgba(255,255,255,0.75);
    font-size:22px; font-weight:600; letter-spacing:2px;
  }
</style>
</head>
<body>
  <div class="post">
    <img class="background" src="{{FOTO}}">
    <div class="overlay"></div>
    <div class="category">{{CATEGORIA}}</div>
    <img class="logo" src="{{LOGO}}">
    <div class="headline" id="headline">{{MANCHETE}}</div>
    <div class="footer">PORTALMETALMECANICA.COM.BR</div>
  </div>
  <script>
    (function () {
      var el = document.getElementById('headline');
      var maxBottom = 1310;
      var size = 48;
      function bottomOf(node) { return node.getBoundingClientRect().bottom; }
      function lines() {
        var lh = parseFloat(getComputedStyle(el).lineHeight);
        return Math.round(el.getBoundingClientRect().height / lh);
      }
      while (size > 30 && (lines() > 3 || bottomOf(el) > maxBottom)) {
        size -= 2;
        el.style.fontSize = size + 'px';
      }
    })();
  </script>
</body>
</html>
